<svg fill="none" width="100%" height="100%" viewBox="0 0 1440 565" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Awesome Cohub">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0C10">
        <animate attributeName="stop-color" values="#0B0C10;#10121A;#0B0C10" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#14161F"/>
      <stop offset="100%" stop-color="#1A100C">
        <animate attributeName="stop-color" values="#1A100C;#2A150C;#1A100C" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="heroGlow" cx="50%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.38">
        <animate attributeName="stop-opacity" values="0.22;0.45;0.22" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#FF4500" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FF9B7A">
        <animate attributeName="stop-color" values="#FF9B7A;#FF4500;#FF9B7A" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FF4500" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFB08A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- official-ish mark -->
    <symbol id="mark" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="32" fill="#FF4500"/>
      <g transform="translate(0,192) scale(0.1,-0.1)" fill="#FFFFFF">
        <path d="M853 1314 c-63 -23 -128 -86 -164 -160 -27 -54 -33 -79 -37 -157 -10 -196 63 -332 205 -383 53 -18 160 -17 219 3 92 31 184 151 184 240 0 21 -5 23 -45 23 -43 0 -45 -1 -55 -38 -13 -52 -48 -101 -89 -129 -27 -18 -48 -23 -98 -23 -77 0 -120 16 -156 60 -50 59 -61 96 -61 210 -1 89 3 113 22 155 28 61 47 82 95 107 48 24 152 26 195 4 36 -19 80 -69 88 -102 5 -21 12 -24 55 -24 27 0 49 4 49 8 0 5 -7 29 -16 55 -18 54 -74 115 -129 142 -54 25 -203 31 -262 9z"/>
      </g>
    </symbol>
  </defs>

  <!-- canvas -->
  <rect width="1440" height="565" fill="url(#bg)"/>
  <rect width="1440" height="565" fill="url(#heroGlow)"/>

  <!-- grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1">
    <path d="M0 80H1440M0 160H1440M0 240H1440M0 320H1440M0 400H1440M0 480H1440"/>
    <path d="M80 0V565M160 0V565M240 0V565M320 0V565M400 0V565M480 0V565M560 0V565M640 0V565M720 0V565M800 0V565M880 0V565M960 0V565M1040 0V565M1120 0V565M1200 0V565M1280 0V565M1360 0V565"/>
  </g>

  <!-- floating orbs -->
  <g filter="url(#glow)">
    <circle cx="210" cy="150" r="88" fill="#FF4500" fill-opacity="0.12">
      <animate attributeName="cy" values="150;125;150;170;150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.10;0.20;0.10" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1220" cy="410" r="120" fill="#FF4500" fill-opacity="0.10">
      <animate attributeName="cx" values="1220;1190;1220;1245;1220" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.08;0.16;0.08" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="120" r="64" fill="#FF4500" fill-opacity="0.14">
      <animate attributeName="r" values="64;78;64" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="430" r="72" fill="#FF4500" fill-opacity="0.10">
      <animate attributeName="r" values="72;86;72" dur="8s" begin="-2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- constellation nodes -->
  <g filter="url(#soft)">
    <!-- links -->
    <g stroke="#FF4500" stroke-width="1.2">
      <line x1="180" y1="280" x2="300" y2="180" stroke-opacity="0.18">
        <animate attributeName="stroke-opacity" values="0.10;0.35;0.10" dur="8s" repeatCount="indefinite"/>
      </line>
      <line x1="300" y1="180" x2="420" y2="250" stroke-opacity="0.16">
        <animate attributeName="stroke-opacity" values="0.08;0.30;0.08" dur="8s" begin="-1s" repeatCount="indefinite"/>
      </line>
      <line x1="1100" y1="200" x2="1240" y2="280" stroke-opacity="0.16">
        <animate attributeName="stroke-opacity" values="0.08;0.32;0.08" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </line>
      <line x1="1240" y1="280" x2="1300" y2="180" stroke-opacity="0.14">
        <animate attributeName="stroke-opacity" values="0.08;0.28;0.08" dur="8s" begin="-3s" repeatCount="indefinite"/>
      </line>
      <line x1="200" y1="420" x2="340" y2="470" stroke-opacity="0.14">
        <animate attributeName="stroke-opacity" values="0.08;0.28;0.08" dur="8s" begin="-1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="1080" y1="450" x2="1220" y2="400" stroke-opacity="0.14">
        <animate attributeName="stroke-opacity" values="0.08;0.30;0.08" dur="8s" begin="-2.5s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- dots as "spaces" -->
    <circle cx="180" cy="280" r="4.5" fill="#FF4500">
      <animate attributeName="r" values="3.5;6;3.5" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="180" r="3.5" fill="#FFFFFF" fill-opacity="0.85">
      <animate attributeName="cy" values="180;168;180" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="250" r="4" fill="#FF4500" fill-opacity="0.9">
      <animate attributeName="fill-opacity" values="0.4;1;0.4" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="200" r="4" fill="#FFFFFF" fill-opacity="0.8">
      <animate attributeName="r" values="3;5.5;3" dur="8s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1240" cy="280" r="5" fill="#FF4500">
      <animate attributeName="r" values="4;7;4" dur="8s" begin="-2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="180" r="3" fill="#FFFFFF" fill-opacity="0.75"/>
    <circle cx="200" cy="420" r="3.5" fill="#FFFFFF" fill-opacity="0.75">
      <animate attributeName="cy" values="420;408;420" dur="8s" begin="-3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="470" r="4" fill="#FF4500" fill-opacity="0.85"/>
    <circle cx="1080" cy="450" r="3.5" fill="#FFFFFF" fill-opacity="0.8"/>
    <circle cx="1220" cy="400" r="4.5" fill="#FF4500">
      <animate attributeName="fill-opacity" values="0.45;1;0.45" dur="8s" begin="-1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- center brand -->
  <g>
    <!-- logo -->
    <g transform="translate(488 152)">
      <use href="#mark" x="0" y="0" width="100" height="100" filter="url(#glow)"/>
      <!-- pulse ring -->
      <rect x="-8" y="-8" width="116" height="116" rx="36" fill="none" stroke="#FF4500" stroke-width="2" stroke-opacity="0.5">
        <animate attributeName="stroke-opacity" values="0.55;0;0.55" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-8;-18;-8" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-8;-18;-8" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="width" values="116;136;116" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="height" values="116;136;116" dur="8s" repeatCount="indefinite"/>
      </rect>
      <animateTransform attributeName="transform" type="translate" values="488 152;488 146;488 152" dur="8s" additive="replace" repeatCount="indefinite"/>
    </g>

    <!-- wordmark -->
    <g transform="translate(616 175)">
      <text x="0" y="58" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="76" font-weight="760" letter-spacing="-2" fill="url(#wm)">Cohub</text>
      <text x="3" y="100" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="5.5" fill="#EDEDF2" fill-opacity="0.78">AWESOME ECOSYSTEM</text>
      <rect x="3" y="118" width="300" height="3" rx="2" fill="url(#shine)"/>
      <text x="3" y="156" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#C9C9D1" fill-opacity="0.9">Spaces · Agents · Skills · Works · Checkpoints</text>
    </g>
  </g>

  <!-- chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="650" fill="#F4F4F7">
    <g>
      <rect x="430" y="430" width="92" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF4500" stroke-opacity="0.35"/>
      <circle cx="448" cy="447" r="4" fill="#FF4500"><animate attributeName="opacity" values="0.4;1;0.4" dur="8s" repeatCount="indefinite"/></circle>
      <text x="460" y="452">Spaces</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="8s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="540" y="430" width="90" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF4500" stroke-opacity="0.35"/>
      <circle cx="558" cy="447" r="4" fill="#FF4500"><animate attributeName="opacity" values="0.4;1;0.4" dur="8s" begin="-0.5s" repeatCount="indefinite"/></circle>
      <text x="570" y="452">Agents</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="8s" begin="-0.5s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="648" y="430" width="82" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF4500" stroke-opacity="0.35"/>
      <circle cx="666" cy="447" r="4" fill="#FF4500"><animate attributeName="opacity" values="0.4;1;0.4" dur="8s" begin="-1s" repeatCount="indefinite"/></circle>
      <text x="678" y="452">Skills</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="8s" begin="-1s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="748" y="430" width="86" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF4500" stroke-opacity="0.35"/>
      <circle cx="766" cy="447" r="4" fill="#FF4500"><animate attributeName="opacity" values="0.4;1;0.4" dur="8s" begin="-1.5s" repeatCount="indefinite"/></circle>
      <text x="778" y="452">Works</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="8s" begin="-1.5s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="852" y="430" width="126" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF4500" stroke-opacity="0.35"/>
      <circle cx="870" cy="447" r="4" fill="#FF4500"><animate attributeName="opacity" values="0.4;1;0.4" dur="8s" begin="-2s" repeatCount="indefinite"/></circle>
      <text x="882" y="452">Checkpoints</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="8s" begin="-2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- sweep -->
  <rect x="-220" y="0" width="200" height="565" fill="#FFFFFF" fill-opacity="0.035">
    <animate attributeName="x" values="-220;1460;-220" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
