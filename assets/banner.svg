<?xml version="1.0" encoding="UTF-8"?>
<svg text-rendering="geometricPrecision" shape-rendering="geometricPrecision" xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" fill="none" role="img" aria-label="Awesome Cohub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0B10"/>
      <stop offset="0.55" stop-color="#12141C"/>
      <stop offset="1" stop-color="#1A120E"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 210) rotate(90) scale(420 280)">
      <stop stop-color="#FF4500" stop-opacity="0.34">
        <animate attributeName="stop-opacity" values="0.22;0.38;0.22" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.55" stop-color="#FF4500" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="word" x1="560" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.78" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFB08A"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4500" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#FF4500"/>
      <stop offset="0.8" stop-color="#FF8A5B"/>
      <stop offset="1" stop-color="#FF4500" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-40 0;40 0;-40 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- soft ambient only; never applied to type/logo paths -->
    <filter id="orbBlur" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="logoHalo" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- crisp official mark -->
    <symbol id="mark" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="40" fill="#FF4500"/>
      <g transform="translate(0,192) scale(0.1,-0.1)" fill="#FFFFFF">
        <path d="M853 1314 c-63 -23 -128 -86 -164 -160 -27 -54 -33 -79 -37 -157 -10 -196 63 -332 205 -383 53 -18 160 -17 219 3 92 31 184 151 184 240 0 21 -5 23 -45 23 -43 0 -45 -1 -55 -38 -13 -52 -48 -101 -89 -129 -27 -18 -48 -23 -98 -23 -77 0 -120 16 -156 60 -50 59 -61 96 -61 210 -1 89 3 113 22 155 28 61 47 82 95 107 48 24 152 26 195 4 36 -19 80 -69 88 -102 5 -21 12 -24 55 -24 27 0 49 4 49 8 0 5 -7 29 -16 55 -18 54 -74 115 -129 142 -54 25 -203 31 -262 9z"/>
      </g>
    </symbol>
  </defs>

  <!-- solid crisp background -->
  <rect width="1440" height="480" fill="url(#bg)"/>
  <rect width="1440" height="480" fill="url(#coreGlow)"/>

  <!-- grid: thin, no blur -->
  <g stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1" shape-rendering="crispEdges">
    <path d="M0 60H1440M0 120H1440M0 180H1440M0 240H1440M0 300H1440M0 360H1440M0 420H1440"/>
    <path d="M60 0V480M120 0V480M180 0V480M240 0V480M300 0V480M360 0V480M420 0V480M480 0V480M540 0V480M600 0V480M660 0V480M720 0V480M780 0V480M840 0V480M900 0V480M960 0V480M1020 0V480M1080 0V480M1140 0V480M1200 0V480M1260 0V480M1320 0V480M1380 0V480"/>
  </g>

  <!-- ambient orbs (blurred shapes only) -->
  <g filter="url(#orbBlur)" opacity="0.9">
    <circle cx="180" cy="120" r="90" fill="#FF4500" fill-opacity="0.22">
      <animate attributeName="fill-opacity" values="0.16;0.28;0.16" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1260" cy="110" r="80" fill="#FF4500" fill-opacity="0.18">
      <animate attributeName="fill-opacity" values="0.12;0.24;0.12" dur="6s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="380" r="95" fill="#FF4500" fill-opacity="0.16">
      <animate attributeName="r" values="90;105;90" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1280" cy="370" r="110" fill="#FF4500" fill-opacity="0.18">
      <animate attributeName="r" values="100;118;100" dur="6s" begin="-2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- constellation: sharp nodes + lines -->
  <g stroke="#FF4500" stroke-width="1.5" stroke-linecap="round">
    <line x1="150" y1="250" x2="260" y2="160" stroke-opacity="0.35">
      <animate attributeName="stroke-opacity" values="0.18;0.5;0.18" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="260" y1="160" x2="360" y2="220" stroke-opacity="0.28">
      <animate attributeName="stroke-opacity" values="0.14;0.42;0.14" dur="6s" begin="-1s" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="340" x2="230" y2="390" stroke-opacity="0.25">
      <animate attributeName="stroke-opacity" values="0.12;0.4;0.12" dur="6s" begin="-2s" repeatCount="indefinite"/>
    </line>
    <line x1="1080" y1="170" x2="1200" y2="240" stroke-opacity="0.3">
      <animate attributeName="stroke-opacity" values="0.15;0.45;0.15" dur="6s" begin="-0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="1200" y1="240" x2="1320" y2="150" stroke-opacity="0.28">
      <animate attributeName="stroke-opacity" values="0.14;0.42;0.14" dur="6s" begin="-1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="1120" y1="390" x2="1260" y2="340" stroke-opacity="0.25">
      <animate attributeName="stroke-opacity" values="0.12;0.4;0.12" dur="6s" begin="-2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <g>
    <!-- sharp dots; subtle r pulse only -->
    <circle cx="150" cy="250" r="4" fill="#FF4500">
      <animate attributeName="r" values="3.5;5;3.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="160" r="3.5" fill="#FFFFFF"/>
    <circle cx="360" cy="220" r="4" fill="#FF4500"/>
    <circle cx="120" cy="340" r="3" fill="#FFFFFF"/>
    <circle cx="230" cy="390" r="4" fill="#FF4500"/>
    <circle cx="1080" cy="170" r="3.5" fill="#FFFFFF"/>
    <circle cx="1200" cy="240" r="5" fill="#FF4500">
      <animate attributeName="r" values="4;6;4" dur="6s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="150" r="3" fill="#FFFFFF"/>
    <circle cx="1120" cy="390" r="3.5" fill="#FFFFFF"/>
    <circle cx="1260" cy="340" r="4" fill="#FF4500"/>
  </g>

  <!-- center brand cluster -->
  <g transform="translate(0,8)">
    <!-- soft halo behind logo ONLY (separate layer) -->
    <circle cx="538" cy="188" r="58" fill="#FF4500" fill-opacity="0.35" filter="url(#logoHalo)">
      <animate attributeName="fill-opacity" values="0.22;0.42;0.22" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- CRISP logo: no filter -->
    <g transform="translate(490 140)">
      <use href="#mark" width="96" height="96"/>
      <!-- crisp ring pulse -->
      <rect x="-6" y="-6" width="108" height="108" rx="28" fill="none" stroke="#FF4500" stroke-width="1.5" stroke-opacity="0.55">
        <animate attributeName="stroke-opacity" values="0.55;0;0.55" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-6;-14;-6" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-6;-14;-6" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="width" values="108;124;108" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="height" values="108;124;108" dur="6s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- CRISP wordmark -->
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" paint-order="stroke fill">
      <text x="610" y="198" font-size="78" font-weight="750" letter-spacing="-2.2" fill="url(#word)">Cohub</text>
      <text x="614" y="236" font-size="15" font-weight="650" letter-spacing="6" fill="#D7D7DE">AWESOME ECOSYSTEM</text>
      <rect x="614" y="250" width="120" height="2.5" rx="1.25" fill="url(#rule)"/>
      <text x="614" y="284" font-size="16" font-weight="500" letter-spacing="0.2" fill="#B7B7C2">Spaces · Agents · Skills · Works · Checkpoints</text>
    </g>
  </g>

  <!-- chips: sharp strokes -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13.5" font-weight="650" fill="#F3F3F7">
    <g transform="translate(470 360)">
      <rect width="86" height="32" rx="16" fill="#0E0F14" fill-opacity="0.55" stroke="#FF4500" stroke-opacity="0.55" stroke-width="1.25"/>
      <circle cx="16" cy="16" r="3.5" fill="#FF4500"/>
      <text x="28" y="20.5">Spaces</text>
      <animateTransform attributeName="transform" type="translate" values="470 360;470 356;470 360" dur="6s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(568 360)">
      <rect width="86" height="32" rx="16" fill="#0E0F14" fill-opacity="0.55" stroke="#FF4500" stroke-opacity="0.55" stroke-width="1.25"/>
      <circle cx="16" cy="16" r="3.5" fill="#FF4500"/>
      <text x="28" y="20.5">Agents</text>
      <animateTransform attributeName="transform" type="translate" values="568 360;568 356;568 360" dur="6s" begin="-0.4s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(666 360)">
      <rect width="78" height="32" rx="16" fill="#0E0F14" fill-opacity="0.55" stroke="#FF4500" stroke-opacity="0.55" stroke-width="1.25"/>
      <circle cx="16" cy="16" r="3.5" fill="#FF4500"/>
      <text x="28" y="20.5">Skills</text>
      <animateTransform attributeName="transform" type="translate" values="666 360;666 356;666 360" dur="6s" begin="-0.8s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(756 360)">
      <rect width="82" height="32" rx="16" fill="#0E0F14" fill-opacity="0.55" stroke="#FF4500" stroke-opacity="0.55" stroke-width="1.25"/>
      <circle cx="16" cy="16" r="3.5" fill="#FF4500"/>
      <text x="28" y="20.5">Works</text>
      <animateTransform attributeName="transform" type="translate" values="756 360;756 356;756 360" dur="6s" begin="-1.2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(850 360)">
      <rect width="118" height="32" rx="16" fill="#0E0F14" fill-opacity="0.55" stroke="#FF4500" stroke-opacity="0.55" stroke-width="1.25"/>
      <circle cx="16" cy="16" r="3.5" fill="#FF4500"/>
      <text x="28" y="20.5">Checkpoints</text>
      <animateTransform attributeName="transform" type="translate" values="850 360;850 356;850 360" dur="6s" begin="-1.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- subtle light sweep: low opacity so it doesn't smear type -->
  <rect x="-180" y="0" width="140" height="480" fill="#FFFFFF" fill-opacity="0.03">
    <animate attributeName="x" values="-180;1480;-180" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
