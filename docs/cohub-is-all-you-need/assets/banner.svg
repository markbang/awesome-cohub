<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" fill="none" role="img" aria-label="Cohub Is All You Need">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06070B"/>
      <stop offset="0.5" stop-color="#0E1118"/>
      <stop offset="1" stop-color="#1A0F0C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="44%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.16;0.38;0.22;0.34;0.16" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#FF4500" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="78%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FF9A70">
        <animate attributeName="stop-color" values="#FF9A70;#FF4500;#FFC2A6;#FF9A70" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FF4500" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FFB08A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <symbol id="mark" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="40" fill="#FF4500"/>
      <g transform="translate(0,192) scale(0.1,-0.1)" fill="#FFFFFF">
        <path d="M853 1314 c-63 -23 -128 -86 -164 -160 -27 -54 -33 -79 -37 -157 -10 -196 63 -332 205 -383 53 -18 160 -17 219 3 92 31 184 151 184 240 0 21 -5 23 -45 23 -43 0 -45 -1 -55 -38 -13 -52 -48 -101 -89 -129 -27 -18 -48 -23 -98 -23 -77 0 -120 16 -156 60 -50 59 -61 96 -61 210 -1 89 3 113 22 155 28 61 47 82 95 107 48 24 152 26 195 4 36 -19 80 -69 88 -102 5 -21 12 -24 55 -24 27 0 49 4 49 8 0 5 -7 29 -16 55 -18 54 -74 115 -129 142 -54 25 -203 31 -262 9z"/>
      </g>
    </symbol>
  </defs>

  <rect width="1440" height="480" fill="url(#bg)"/>
  <rect width="1440" height="480" fill="url(#glow)"/>

  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 80H1440M0 160H1440M0 240H1440M0 320H1440M0 400H1440"/>
    <path d="M120 0V480M240 0V480M360 0V480M480 0V480M600 0V480M720 0V480M840 0V480M960 0V480M1080 0V480M1200 0V480M1320 0V480"/>
  </g>

  <!-- PATH MORPH blobs (decorative only) -->
  <g filter="url(#soft)">
    <path fill="#FF4500" fill-opacity="0.2">
      <animate attributeName="d" dur="6s" repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.33;0.66;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
        values="M170,130C235,55,350,70,365,150C380,230,295,275,210,255C125,235,105,205,170,130Z;
                M195,105C275,50,365,95,350,175C335,255,255,285,180,250C105,215,115,160,195,105Z;
                M155,140C225,65,340,45,380,140C420,235,310,295,220,275C130,255,85,215,155,140Z;
                M170,130C235,55,350,70,365,150C380,230,295,275,210,255C125,235,105,205,170,130Z"/>
    </path>
    <path fill="#FF4500" fill-opacity="0.15">
      <animate attributeName="d" dur="6s" begin="-2s" repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.33;0.66;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
        values="M1210,330C1295,265,1410,295,1385,380C1360,465,1235,490,1165,445C1095,400,1125,395,1210,330Z;
                M1190,310C1285,245,1420,285,1375,370C1330,455,1215,500,1145,450C1075,400,1095,375,1190,310Z;
                M1235,345C1315,280,1405,325,1365,395C1325,465,1205,475,1160,435C1115,395,1155,410,1235,345Z;
                M1210,330C1295,265,1410,295,1385,380C1360,465,1235,490,1165,445C1095,400,1125,395,1210,330Z"/>
    </path>
  </g>

  <!-- STORY RAIL: stroke draw + morphing ribbon -->
  <path d="M150 355C340 295 500 295 630 355S900 420 1030 355S1260 295 1340 335" fill="none" stroke="#FF4500" stroke-opacity="0.14" stroke-width="2.5"/>
  <path d="M150 355C340 295 500 295 630 355S900 420 1030 355S1260 295 1340 335" fill="none" stroke="url(#beam)" stroke-width="3.5" stroke-linecap="round"
        pathLength="1000" stroke-dasharray="1000" stroke-dashoffset="1000">
    <animate attributeName="stroke-dashoffset" values="1000;0;0;1000" keyTimes="0;0.42;0.78;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </path>
  <path fill="none" stroke="#FF4500" stroke-opacity="0.35" stroke-width="1.6" stroke-linecap="round">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M150,365C340,315 500,335 630,365S900,405 1030,365S1260,325 1340,345;
              M150,360C340,305 500,325 630,360S900,415 1030,360S1260,315 1340,340;
              M150,370C340,320 500,340 630,370S900,400 1030,370S1260,330 1340,350;
              M150,365C340,315 500,335 630,365S900,405 1030,365S1260,325 1340,345"/>
  </path>

  <!-- traveling energy particle -->
  <circle r="5" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.85;1" dur="6s" repeatCount="indefinite"/>
    <animateMotion dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" keyPoints="0;1;1" keyTimes="0;0.7;1"
      path="M150 355C340 295 500 295 630 355S900 420 1030 355S1260 295 1340 335"/>
  </circle>

  <!-- NODES staged (opacity keyframes, looping) -->
  <g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#F3F3F7">
    <g>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.92;1" dur="6s" repeatCount="indefinite"/>
      <g transform="translate(150 355)">
        <circle r="24" fill="none" stroke="#FF4500" stroke-width="2">
          <animate attributeName="r" values="8;30;22" keyTimes="0;0.45;1" dur="6s" begin="0s" repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" values="0;0.85;0.35" dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle r="8" fill="#FF4500">
          <animate attributeName="r" values="0;11;8" keyTimes="0;0.2;0.4" dur="6s" repeatCount="indefinite"/>
        </circle>
        <text text-anchor="middle" y="48">Space</text>
      </g>
    </g>
    <g>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.18;0.28;0.92;1" dur="6s" repeatCount="indefinite"/>
      <g transform="translate(630 355)">
        <circle r="22" fill="none" stroke="#FF4500" stroke-width="2" stroke-opacity="0.45"/>
        <circle r="8" fill="#FFFFFF">
          <animate attributeName="r" values="6;10;8" dur="6s" begin="-1s" repeatCount="indefinite"/>
        </circle>
        <text text-anchor="middle" y="48">Skills</text>
      </g>
    </g>
    <g>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.36;0.46;0.92;1" dur="6s" repeatCount="indefinite"/>
      <g transform="translate(1030 355)">
        <circle r="22" fill="none" stroke="#FF4500" stroke-width="2" stroke-opacity="0.45"/>
        <circle r="8" fill="#FF4500"/>
        <text text-anchor="middle" y="48">Save</text>
      </g>
    </g>
    <g>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.54;0.64;0.92;1" dur="6s" repeatCount="indefinite"/>
      <g transform="translate(1340 335)">
        <circle r="22" fill="none" stroke="#FF4500" stroke-width="2" stroke-opacity="0.45"/>
        <circle r="8" fill="#FFFFFF"/>
        <text text-anchor="middle" y="48">Work</text>
      </g>
    </g>
  </g>

  <!-- LOGO: stroke draw frame + scale settle -->
  <g transform="translate(292 88)">
    <circle cx="48" cy="48" r="58" fill="#FF4500" fill-opacity="0.22" filter="url(#halo)">
      <animate attributeName="r" values="42;64;56" keyTimes="0;0.4;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.1;0.34;0.18" dur="6s" repeatCount="indefinite"/>
    </circle>
    <rect x="0" y="0" width="96" height="96" rx="28" fill="none" stroke="#FF4500" stroke-width="2.5"
      pathLength="400" stroke-dasharray="400" stroke-dashoffset="400">
      <animate attributeName="stroke-dashoffset" values="400;0;0;400" keyTimes="0;0.28;0.86;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.7;1.08;1;1" keyTimes="0;0.32;0.5;1" dur="6s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.2 0.85 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
      <use href="#mark" width="96" height="96" x="0" y="0"/>
    </g>
  </g>

  <!-- TITLE staged reveal (layer-style opacity) -->
  <g font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Helvetica,Arial,sans-serif" font-size="56" font-weight="780" letter-spacing="-1.5" fill="url(#tg)">
    <text x="426" y="148">
      <tspan>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.2;0.9;1" dur="6s" repeatCount="indefinite"/>Cohub</tspan>
      <tspan dx="16">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.18;0.28;0.9;1" dur="6s" repeatCount="indefinite"/>Is</tspan>
      <tspan dx="16">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.26;0.36;0.9;1" dur="6s" repeatCount="indefinite"/>All</tspan>
      <tspan dx="16">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.34;0.44;0.9;1" dur="6s" repeatCount="indefinite"/>You</tspan>
      <tspan dx="16">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.42;0.52;0.9;1" dur="6s" repeatCount="indefinite"/>Need</tspan>
    </text>
  </g>

  <!-- underline stroke draw -->
  <path d="M428 170 H1020" fill="none" stroke="#FF4500" stroke-width="3.2" stroke-linecap="round"
    pathLength="600" stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" values="600;600;0;0;600" keyTimes="0;0.38;0.58;0.88;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </path>

  <text x="430" y="204" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="560" fill="#C8C8D1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.6;0.9;1" dur="6s" repeatCount="indefinite"/>
    Best practices for builders &amp; agents · Space → Skills → Save → Work
  </text>

  <!-- right constellation with morphing hull -->
  <g transform="translate(1040 70)">
    <path fill="none" stroke="#FF4500" stroke-width="1.7" stroke-opacity="0.5" stroke-linejoin="round">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M10,50 L90,15 L170,55 L145,140 L35,130 Z;
                M25,35 L105,20 L175,45 L130,150 L20,120 Z;
                M5,60 L85,10 L165,70 L150,135 L40,145 Z;
                M10,50 L90,15 L170,55 L145,140 L35,130 Z"/>
    </path>
    <!-- edge draw overlay -->
    <path d="M10,50 L90,15 L170,55 L145,140 L35,130 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.2"
      pathLength="500" stroke-dasharray="500" stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset" values="500;0;0;500" keyTimes="0;0.45;0.8;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M10,50 L90,15 L170,55 L145,140 L35,130 Z;
                M25,35 L105,20 L175,45 L130,150 L20,120 Z;
                M5,60 L85,10 L165,70 L150,135 L40,145 Z;
                M10,50 L90,15 L170,55 L145,140 L35,130 Z"/>
    </path>
    <g>
      <circle r="4.5" fill="#FF4500"><animate attributeName="cx" values="10;25;5;10" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="50;35;60;50" dur="6s" repeatCount="indefinite"/></circle>
      <circle r="4.5" fill="#FFFFFF"><animate attributeName="cx" values="90;105;85;90" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="15;20;10;15" dur="6s" repeatCount="indefinite"/></circle>
      <circle r="4.5" fill="#FF4500"><animate attributeName="cx" values="170;175;165;170" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="55;45;70;55" dur="6s" repeatCount="indefinite"/></circle>
      <circle r="4.5" fill="#FFFFFF"><animate attributeName="cx" values="145;130;150;145" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="140;150;135;140" dur="6s" repeatCount="indefinite"/></circle>
      <circle r="4.5" fill="#FF4500"><animate attributeName="cx" values="35;20;40;35" dur="6s" repeatCount="indefinite"/><animate attributeName="cy" values="130;120;145;130" dur="6s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- timeline scrub bar -->
  <g transform="translate(150 448)">
    <rect width="1140" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.07"/>
    <rect height="5" rx="2.5" fill="#FF4500" width="0">
      <animate attributeName="width" values="0;1140;1140;0" keyTimes="0;0.72;0.86;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
  </g>
</svg>
