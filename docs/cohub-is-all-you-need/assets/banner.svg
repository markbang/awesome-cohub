<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" fill="none" role="img" aria-label="Cohub Is All You Need" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07080C"/>
      <stop offset="0.55" stop-color="#10131A"/>
      <stop offset="1" stop-color="#1A100C"/>
    </linearGradient>

    <radialGradient id="hero" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 190) rotate(90) scale(520 300)">
      <stop stop-color="#FF4500" stop-opacity="0.28">
        <animate attributeName="stop-opacity" values="0.18;0.34;0.18" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.55" stop-color="#FF4500" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="420" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.72" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFB08A">
        <animate attributeName="stop-color" values="#FFB08A;#FF4500;#FFB08A" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0"/>
      <stop offset="35%" stop-color="#FF4500" stop-opacity="1"/>
      <stop offset="65%" stop-color="#FFB08A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.35 0;0.35 0;-0.35 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="orbBlur" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="softHalo" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- official C mark -->
    <symbol id="mark" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="40" fill="#FF4500"/>
      <g transform="translate(0,192) scale(0.1,-0.1)" fill="#FFFFFF">
        <path d="M853 1314 c-63 -23 -128 -86 -164 -160 -27 -54 -33 -79 -37 -157 -10 -196 63 -332 205 -383 53 -18 160 -17 219 3 92 31 184 151 184 240 0 21 -5 23 -45 23 -43 0 -45 -1 -55 -38 -13 -52 -48 -101 -89 -129 -27 -18 -48 -23 -98 -23 -77 0 -120 16 -156 60 -50 59 -61 96 -61 210 -1 89 3 113 22 155 28 61 47 82 95 107 48 24 152 26 195 4 36 -19 80 -69 88 -102 5 -21 12 -24 55 -24 27 0 49 4 49 8 0 5 -7 29 -16 55 -18 54 -74 115 -129 142 -54 25 -203 31 -262 9z"/>
      </g>
    </symbol>

    <!-- loop chip icons as simple glyphs -->
    <symbol id="i-space" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="4" stroke="#FF4500" stroke-width="1.8" fill="none"/>
      <circle cx="12" cy="12" r="3" fill="#FF4500"/>
    </symbol>
    <symbol id="i-save" viewBox="0 0 24 24">
      <path d="M6 4h10l4 4v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke="#FF4500" stroke-width="1.8" fill="none"/>
      <path d="M8 4v6h8V4" stroke="#FF4500" stroke-width="1.6" fill="none"/>
      <rect x="9" y="14" width="6" height="4" rx="1" fill="#FF4500"/>
    </symbol>
    <symbol id="i-work" viewBox="0 0 24 24">
      <path d="M4 8h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8z" stroke="#FF4500" stroke-width="1.8" fill="none"/>
      <path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="#FF4500" stroke-width="1.8" fill="none"/>
    </symbol>
  </defs>

  <!-- canvas -->
  <rect width="1440" height="420" fill="url(#bg)"/>
  <rect width="1440" height="420" fill="url(#hero)"/>

  <!-- crisp grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1" shape-rendering="crispEdges">
    <path d="M0 60H1440M0 120H1440M0 180H1440M0 240H1440M0 300H1440M0 360H1440"/>
    <path d="M80 0V420M160 0V420M240 0V420M320 0V420M400 0V420M480 0V420M560 0V420M640 0V420M720 0V420M800 0V420M880 0V420M960 0V420M1040 0V420M1120 0V420M1200 0V420M1280 0V420M1360 0V420"/>
  </g>

  <!-- ambient orbs only (blurred) -->
  <g filter="url(#orbBlur)" opacity="0.95">
    <circle cx="180" cy="110" r="88" fill="#FF4500" fill-opacity="0.20">
      <animate attributeName="fill-opacity" values="0.14;0.26;0.14" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1280" cy="320" r="110" fill="#FF4500" fill-opacity="0.16">
      <animate attributeName="r" values="100;118;100" dur="8s" begin="-2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="90" r="70" fill="#FF4500" fill-opacity="0.14">
      <animate attributeName="cy" values="90;70;90" dur="8s" begin="-1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- narrative loop graph: Space → Agent/Skills → Save → Work → Fork -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- connecting arcs -->
    <path d="M220 300 C 360 240, 480 240, 560 300" stroke="#FF4500" stroke-width="1.6" stroke-opacity="0.35" fill="none">
      <animate attributeName="stroke-opacity" values="0.18;0.5;0.18" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M560 300 C 680 360, 800 360, 920 300" stroke="#FF4500" stroke-width="1.6" stroke-opacity="0.35" fill="none">
      <animate attributeName="stroke-opacity" values="0.18;0.5;0.18" dur="8s" begin="-1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M920 300 C 1040 240, 1160 240, 1280 300" stroke="#FF4500" stroke-width="1.6" stroke-opacity="0.35" fill="none">
      <animate attributeName="stroke-opacity" values="0.18;0.5;0.18" dur="8s" begin="-3s" repeatCount="indefinite"/>
    </path>
    <!-- return fork arc (subtle) -->
    <path d="M1280 300 C 980 390, 560 390, 220 300" stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.12" fill="none" stroke-dasharray="4 8">
      <animate attributeName="stroke-dashoffset" values="0;-48" dur="8s" repeatCount="indefinite"/>
    </path>

    <!-- traveling pulse along main path -->
    <circle r="4" fill="#FFFFFF">
      <animateMotion dur="8s" repeatCount="indefinite" path="M220 300 C 360 240, 480 240, 560 300 C 680 360, 800 360, 920 300 C 1040 240, 1160 240, 1280 300"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- nodes -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="650" fill="#F2F2F5">
    <!-- Space -->
    <g transform="translate(220 300)">
      <circle r="18" fill="#0E1016" stroke="#FF4500" stroke-width="1.5"/>
      <circle r="5" fill="#FF4500">
        <animate attributeName="r" values="4;6.5;4" dur="8s" repeatCount="indefinite"/>
      </circle>
      <text text-anchor="middle" y="40">Space</text>
    </g>
    <!-- Skills -->
    <g transform="translate(560 300)">
      <circle r="18" fill="#0E1016" stroke="#FF4500" stroke-width="1.5"/>
      <circle r="5" fill="#FFFFFF">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="8s" begin="-1s" repeatCount="indefinite"/>
      </circle>
      <text text-anchor="middle" y="40">Skills</text>
    </g>
    <!-- Save -->
    <g transform="translate(920 300)">
      <circle r="18" fill="#0E1016" stroke="#FF4500" stroke-width="1.5"/>
      <circle r="5" fill="#FF4500">
        <animate attributeName="r" values="4;6.5;4" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </circle>
      <text text-anchor="middle" y="40">Save</text>
    </g>
    <!-- Work -->
    <g transform="translate(1280 300)">
      <circle r="18" fill="#0E1016" stroke="#FF4500" stroke-width="1.5"/>
      <circle r="5" fill="#FFFFFF"/>
      <text text-anchor="middle" y="40">Work</text>
    </g>
  </g>

  <!-- brand + title (sharp, no blur) -->
  <g>
    <!-- halo behind logo only -->
    <circle cx="318" cy="148" r="52" fill="#FF4500" fill-opacity="0.28" filter="url(#softHalo)">
      <animate attributeName="fill-opacity" values="0.18;0.36;0.18" dur="8s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(270 100)">
      <use href="#mark" width="96" height="96"/>
      <!-- pulse ring -->
      <rect x="-7" y="-7" width="110" height="110" rx="30" fill="none" stroke="#FF4500" stroke-width="1.5" stroke-opacity="0.55">
        <animate attributeName="stroke-opacity" values="0.55;0;0.55" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-7;-16;-7" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-7;-16;-7" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="width" values="110;128;110" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="height" values="110;128;110" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Inter, Helvetica, Arial, sans-serif">
      <text x="396" y="148" font-size="54" font-weight="760" letter-spacing="-1.4" fill="url(#titleGrad)">Cohub Is All You Need</text>
      <text x="400" y="186" font-size="18" font-weight="560" letter-spacing="0.2" fill="#C8C8D0">Best practices for builders &amp; agents · Space → Skills → Save → Work</text>
      <rect x="400" y="204" width="280" height="3" rx="1.5" fill="url(#rule)"/>
    </g>
  </g>

  <!-- top-right loop chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="650" fill="#ECECF1">
    <g transform="translate(980 48)">
      <rect width="118" height="34" rx="17" fill="#0E1016" fill-opacity="0.7" stroke="#FF4500" stroke-opacity="0.45"/>
      <use href="#i-space" x="12" y="5" width="24" height="24"/>
      <text x="42" y="22">Playbooks</text>
      <animateTransform attributeName="transform" type="translate" values="980 48;980 44;980 48" dur="8s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(1112 48)">
      <rect width="100" height="34" rx="17" fill="#0E1016" fill-opacity="0.7" stroke="#FF4500" stroke-opacity="0.45"/>
      <use href="#i-save" x="12" y="5" width="24" height="24"/>
      <text x="42" y="22">Matrix</text>
      <animateTransform attributeName="transform" type="translate" values="1112 48;1112 44;1112 48" dur="8s" begin="-0.7s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(1226 48)">
      <rect width="150" height="34" rx="17" fill="#0E1016" fill-opacity="0.7" stroke="#FF4500" stroke-opacity="0.45"/>
      <use href="#i-work" x="12" y="5" width="24" height="24"/>
      <text x="42" y="22">Deep dives</text>
      <animateTransform attributeName="transform" type="translate" values="1226 48;1226 44;1226 48" dur="8s" begin="-1.4s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- soft sweep -->
  <rect x="-200" y="0" width="160" height="420" fill="#FFFFFF" fill-opacity="0.03">
    <animate attributeName="x" values="-200;1480;-200" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
