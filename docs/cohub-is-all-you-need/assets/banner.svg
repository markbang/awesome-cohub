<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="520" viewBox="0 0 1440 520" fill="none" role="img" aria-label="Cohub Is All You Need">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05060A"/>
      <stop offset="55%" stop-color="#0C0F16"/>
      <stop offset="100%" stop-color="#160E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="34%" r="48%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FF4500" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFB08A"/>
    </linearGradient>
    <linearGradient id="railGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#FF4500" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFB08A" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="blob" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <symbol id="mark" viewBox="0 0 192 192">
      <rect width="192" height="192" rx="40" fill="#FF4500"/>
      <g transform="translate(0,192) scale(0.1,-0.1)" fill="#FFFFFF">
        <path d="M853 1314 c-63 -23 -128 -86 -164 -160 -27 -54 -33 -79 -37 -157 -10 -196 63 -332 205 -383 53 -18 160 -17 219 3 92 31 184 151 184 240 0 21 -5 23 -45 23 -43 0 -45 -1 -55 -38 -13 -52 -48 -101 -89 -129 -27 -18 -48 -23 -98 -23 -77 0 -120 16 -156 60 -50 59 -61 96 -61 210 -1 89 3 113 22 155 28 61 47 82 95 107 48 24 152 26 195 4 36 -19 80 -69 88 -102 5 -21 12 -24 55 -24 27 0 49 4 49 8 0 5 -7 29 -16 55 -18 54 -74 115 -129 142 -54 25 -203 31 -262 9z"/>
      </g>
    </symbol>
  </defs>

  <!-- Timeline (one-shot, no loop):
       0.0–2.6s  ACT A — brand + title lands and holds
       2.7s+     ACT B — path / nodes / pulse play once, freeze end state
  -->

  <rect width="1440" height="520" fill="url(#bg)"/>
  <rect width="1440" height="520" fill="url(#glow)"/>

  <!-- quiet grid (static after fade) -->
  <g stroke="#FFFFFF" stroke-width="1" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0.04" dur="0.9s" fill="freeze"/>
    <path d="M0 80H1440M0 160H1440M0 240H1440M0 320H1440M0 400H1440M0 480H1440"/>
    <path d="M120 0V520M240 0V520M360 0V520M480 0V520M600 0V520M720 0V520M840 0V520M960 0V520M1080 0V520M1200 0V520M1320 0V520"/>
  </g>

  <!-- soft ambient blobs: appear once with title, then hold (no morph loop) -->
  <g filter="url(#blob)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
    <path fill="#FF4500" fill-opacity="0.18"
      d="M165,125C245,50,360,70,375,155C390,240,295,285,205,260C115,235,85,200,165,125Z"/>
    <path fill="#FF4500" fill-opacity="0.12"
      d="M1200,320C1300,250,1415,290,1380,385C1345,480,1220,500,1155,450C1090,400,1100,390,1200,320Z"/>
  </g>

  <!-- ===== ACT A: LOGO ===== -->
  <g transform="translate(280 95)">
    <circle cx="48" cy="48" r="0" fill="#FF4500" fill-opacity="0.28" filter="url(#halo)">
      <animate attributeName="r" values="0;58;52" keyTimes="0;0.6;1" dur="1.1s" begin="0.15s" fill="freeze"
        calcMode="spline" keySplines="0.2 0.9 0.2 1;0.4 0 0.2 1"/>
    </circle>
    <rect x="0" y="0" width="96" height="96" rx="28" fill="none" stroke="#FF4500" stroke-width="2.5"
      pathLength="400" stroke-dasharray="400" stroke-dashoffset="400">
      <animate attributeName="stroke-dashoffset" values="400;0" dur="0.95s" begin="0.2s" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.45s" fill="freeze"/>
      <g>
        <animateTransform attributeName="transform" type="scale"
          values="0.78;1.06;1" keyTimes="0;0.55;1" dur="0.75s" begin="0.45s" fill="freeze"
          additive="sum" calcMode="spline" keySplines="0.2 0.85 0.2 1;0.4 0 0.2 1"/>
        <use href="#mark" width="96" height="96"/>
      </g>
    </g>
  </g>

  <!-- ===== ACT A: TITLE WORDS (finish ~2.4s) ===== -->
  <g font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Helvetica,Arial,sans-serif"
     font-size="56" font-weight="780" letter-spacing="-1.5" fill="url(#title)">
    <text x="420" y="150">
      <tspan opacity="0"><animate attributeName="opacity" values="0;1" dur="0.28s" begin="0.85s" fill="freeze"/>Cohub</tspan>
      <tspan dx="16" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.28s" begin="1.12s" fill="freeze"/>Is</tspan>
      <tspan dx="16" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.28s" begin="1.38s" fill="freeze"/>All</tspan>
      <tspan dx="16" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.28s" begin="1.64s" fill="freeze"/>You</tspan>
      <tspan dx="16" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.28s" begin="1.90s" fill="freeze"/>Need</tspan>
    </text>
  </g>

  <path d="M422 172 H 1010" fill="none" stroke="#FF4500" stroke-width="3.2" stroke-linecap="round"
    pathLength="600" stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" values="600;0" dur="0.55s" begin="2.15s" fill="freeze"
      calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <text x="424" y="206" opacity="0"
    font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif"
    font-size="18" font-weight="560" fill="#C9C9D2">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.35s" fill="freeze"/>
    Best practices for builders &amp; agents
  </text>

  <!-- ===== ACT B: motion starts AFTER text is done (begin 2.75s) — once, then hold ===== -->

  <!-- right constellation draws once -->
  <g transform="translate(1020 70)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.35s" begin="2.75s" fill="freeze"/>
    <path fill="none" stroke="#FF4500" stroke-width="1.8" stroke-linejoin="round" stroke-opacity="0.55"
      pathLength="600" stroke-dasharray="600" stroke-dashoffset="600"
      d="M28,40 L110,22 L180,50 L140,155 L25,125 Z">
      <animate attributeName="stroke-dashoffset" values="600;0" dur="1.4s" begin="2.8s" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.35s" begin="3.6s" fill="freeze"/>
      <circle cx="28" cy="40" r="5" fill="#FF4500"/>
      <circle cx="110" cy="22" r="5" fill="#FFFFFF"/>
      <circle cx="180" cy="50" r="5" fill="#FF4500"/>
      <circle cx="140" cy="155" r="5" fill="#FFFFFF"/>
      <circle cx="25" cy="125" r="5" fill="#FF4500"/>
    </g>
  </g>

  <!-- ghost rail -->
  <path d="M160 400 C 360 330, 520 330, 660 400 S 940 470, 1080 400 S 1280 330, 1360 370"
    fill="none" stroke="#FF4500" stroke-opacity="0" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0;0.16" dur="0.3s" begin="2.85s" fill="freeze"/>
  </path>

  <!-- main rail draw-on once -->
  <path d="M160 400 C 360 330, 520 330, 660 400 S 940 470, 1080 400 S 1280 330, 1360 370"
    fill="none" stroke="url(#railGrad)" stroke-width="3.5" stroke-linecap="round"
    pathLength="1200" stroke-dasharray="1200" stroke-dashoffset="1200">
    <animate attributeName="stroke-dashoffset" values="1200;0" dur="2.2s" begin="2.9s" fill="freeze"
      calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- secondary ribbon settles once -->
  <path fill="none" stroke="#FF4500" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0"
    d="M160,412 C360,355 520,375 660,412 S940,448 1080,412 S1280,352 1360,382">
    <animate attributeName="stroke-opacity" values="0;0.38" dur="0.35s" begin="3.1s" fill="freeze"/>
    <animate attributeName="d" dur="1.8s" begin="3.1s" fill="freeze" calcMode="spline"
      keyTimes="0;1" keySplines="0.4 0 0.2 1"
      values="M160,410 C360,350 520,370 660,410 S940,450 1080,410 S1280,350 1360,380;
              M160,412 C360,355 520,375 660,412 S940,448 1080,412 S1280,352 1360,382"/>
  </path>

  <!-- particle travels ONCE along rail, stays at Work -->
  <circle r="5" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.06;1" dur="2.3s" begin="2.95s" fill="freeze"/>
    <animateMotion dur="2.3s" begin="2.95s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"
      path="M160 400 C 360 330, 520 330, 660 400 S 940 470, 1080 400 S 1280 330, 1360 370"/>
  </circle>

  <!-- nodes pop once in sequence -->
  <g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif"
     font-size="13" font-weight="700" fill="#F2F2F6">
    <g opacity="0" transform="translate(160 400)">
      <animate attributeName="opacity" values="0;1" dur="0.22s" begin="3.05s" fill="freeze"/>
      <circle r="0" fill="none" stroke="#FF4500" stroke-width="2">
        <animate attributeName="r" values="0;30;22" keyTimes="0;0.55;1" dur="0.65s" begin="3.05s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.9 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="stroke-opacity" values="0;0.9;0.45" keyTimes="0;0.55;1" dur="0.65s" begin="3.05s" fill="freeze"/>
      </circle>
      <circle r="0" fill="#FF4500">
        <animate attributeName="r" values="0;10;8" keyTimes="0;0.45;1" dur="0.4s" begin="3.05s" fill="freeze"/>
      </circle>
      <text text-anchor="middle" y="48" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="3.2s" fill="freeze"/>Space
      </text>
    </g>

    <g opacity="0" transform="translate(660 400)">
      <animate attributeName="opacity" values="0;1" dur="0.22s" begin="3.65s" fill="freeze"/>
      <circle r="0" fill="none" stroke="#FF4500" stroke-width="2">
        <animate attributeName="r" values="0;30;22" keyTimes="0;0.55;1" dur="0.65s" begin="3.65s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.9 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="stroke-opacity" values="0;0.9;0.45" keyTimes="0;0.55;1" dur="0.65s" begin="3.65s" fill="freeze"/>
      </circle>
      <circle r="0" fill="#FFFFFF">
        <animate attributeName="r" values="0;10;8" keyTimes="0;0.45;1" dur="0.4s" begin="3.65s" fill="freeze"/>
      </circle>
      <text text-anchor="middle" y="48" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="3.8s" fill="freeze"/>Skills
      </text>
    </g>

    <g opacity="0" transform="translate(1080 400)">
      <animate attributeName="opacity" values="0;1" dur="0.22s" begin="4.25s" fill="freeze"/>
      <circle r="0" fill="none" stroke="#FF4500" stroke-width="2">
        <animate attributeName="r" values="0;30;22" keyTimes="0;0.55;1" dur="0.65s" begin="4.25s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.9 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="stroke-opacity" values="0;0.9;0.45" keyTimes="0;0.55;1" dur="0.65s" begin="4.25s" fill="freeze"/>
      </circle>
      <circle r="0" fill="#FF4500">
        <animate attributeName="r" values="0;10;8" keyTimes="0;0.45;1" dur="0.4s" begin="4.25s" fill="freeze"/>
      </circle>
      <text text-anchor="middle" y="48" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="4.4s" fill="freeze"/>Save
      </text>
    </g>

    <g opacity="0" transform="translate(1360 370)">
      <animate attributeName="opacity" values="0;1" dur="0.22s" begin="4.85s" fill="freeze"/>
      <circle r="0" fill="none" stroke="#FF4500" stroke-width="2">
        <animate attributeName="r" values="0;32;22" keyTimes="0;0.55;1" dur="0.7s" begin="4.85s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.9 0.2 1;0.4 0 0.2 1"/>
        <animate attributeName="stroke-opacity" values="0;0.95;0.5" keyTimes="0;0.55;1" dur="0.7s" begin="4.85s" fill="freeze"/>
      </circle>
      <circle r="0" fill="#FFFFFF">
        <animate attributeName="r" values="0;11;8" keyTimes="0;0.45;1" dur="0.45s" begin="4.85s" fill="freeze"/>
      </circle>
      <text text-anchor="middle" y="48" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="5.0s" fill="freeze"/>Work
      </text>
    </g>
  </g>

  <!-- tagline after graph completes -->
  <text x="424" y="238" opacity="0"
    font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif"
    font-size="16" font-weight="600" fill="#FFB08A">
    <animate attributeName="opacity" values="0;1" dur="0.45s" begin="5.25s" fill="freeze"/>
    Space → Skills → Save → Work
  </text>

  <!-- progress bar fills once during Act B, stays full -->
  <g transform="translate(160 492)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.25s" begin="2.85s" fill="freeze"/>
    <rect width="1120" height="5" rx="2.5" fill="#FFFFFF" fill-opacity="0.07"/>
    <rect width="0" height="5" rx="2.5" fill="#FF4500">
      <animate attributeName="width" values="0;1120" dur="2.5s" begin="2.9s" fill="freeze"
        calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
  </g>
</svg>
